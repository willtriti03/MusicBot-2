name: musicbot-ts

services:
  musicbot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./config/config.json:/app/config/config.json:ro
      - ./data:/app/data
      - ./audio_cache:/app/audio_cache
